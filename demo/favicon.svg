<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="32" height="32" rx="8" fill="url(#g1)"/>
  <!-- Network nodes: 3 connected circles -->
  <circle cx="7" cy="16" r="3.5" fill="white" opacity=".95"/>
  <circle cx="16" cy="7" r="3.5" fill="white" opacity=".85"/>
  <circle cx="25" cy="16" r="3.5" fill="white" opacity=".95"/>
  <circle cx="16" cy="25" r="3" fill="white" opacity=".7"/>
  <!-- Connecting edges -->
  <line x1="7" y1="16" x2="16" y2="7"  stroke="white" stroke-width="1.5" stroke-opacity=".6" stroke-linecap="round"/>
  <line x1="16" y1="7" x2="25" y2="16"  stroke="white" stroke-width="1.5" stroke-opacity=".6" stroke-linecap="round"/>
  <line x1="7" y1="16" x2="16" y2="25"  stroke="white" stroke-width="1.5" stroke-opacity=".6" stroke-linecap="round"/>
  <line x1="25" y1="16" x2="16" y2="25" stroke="white" stroke-width="1.5" stroke-opacity=".6" stroke-linecap="round"/>
  <line x1="7" y1="16" x2="25" y2="16"  stroke="white" stroke-width="1"   stroke-opacity=".3" stroke-linecap="round"/>
</svg>